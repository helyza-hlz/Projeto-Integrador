<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de Alicar CSS</title>
    <link rel="stylesheet" href="style.css ">
</head>
<body>
    <h1>Formas de Aplicar CSS</h1>

    <!-- Inçine (na própria tag HTML) -->
     <p style="color: rgb(157, 0, 255);">Texto azul</p>

    <!-- Interno (no head do HTML) -->
      <style>
        p {
            color: #ab07c1c8;;
        }
      </style>

    <!-- Externo (arquivo separado) -->
    <p class="texto">Forma mais recomendada para projetos reais</p>
</body>
</html>
