<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de Tabela</title>
</head>
<body>
    <h1>Elementos de Tabela</h1>
    <p>Os Elemetos de Tabela em HTML são usados para organizar dados em linhas e colunas, como uma planilha.</p>

    <table border="1">
        <caption> Tabela de Produtos</caption>
        <thead>
            <tr>
                <th>Produtos</th>
                <th>Preços</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Teclado</td>
                <td>R$ 80.00</td>
            </tr>
            <tr>
                <td>Mouse</td>
                <td>R$ 20.00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>R$ 100,00</td>
            </tr>
        </tfoot>
    </table>

    <!-- table: define uma tabela -->
    <!-- tr = (table row) define uma linha-->
    <!-- th = (table header) define uma celula de cabeçalho-->
    <!-- td = (table date) define uma celula comum-->
    <!-- thead, tbody, tfoot = estrutura semantica da tabela -->





</body>
</html>
