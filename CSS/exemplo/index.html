<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 01: hello word</title>
    <style>
        body {
                 /* Ativar o flexbox para o alinhamento */
    display: flex;

    /* Centraliza horizontalmente o conteúdo */
    justify-content: center;

    /* Centraliza verticalmente o conteúdo */
    align-items: center;

    /* Define a altura como 100% da tela */
    height: 100vh;

    /* Cor de fundo */
    background: darkslategrey;

    /* Define a fonte do texto */
    font-family: Arial, Helvetica, sans-serif;
}

 /* Estilos aplicados ao título */
h1{
    color: lightcoral;
    
    /* Tamanho da fonte (3 vezes o tamanho padrão) */
    font-size: 40px;

    /* Borda ao redor do texto */
    border: 7px inset lightgreen;
    
    /* Arrendondamento da borda */
    border-radius: 4%;

    /* Espaçamento interno */
    padding: 3px 9px;

    /*  */
    background-color: forestgreen;
        }
    </style>
</head>
<body>
    <!-- texto exibido no navegador -->
    <h1>hello world</h1>
</body>
</html>
